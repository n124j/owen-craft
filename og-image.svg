<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#182034" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#05080f" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fd15f"/>
      <stop offset="100%" stop-color="#4e9330"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative voxel blocks -->
  <g opacity="0.9">
    <rect x="60" y="470" width="64" height="64" fill="#5b3a1e"/>
    <rect x="60" y="470" width="64" height="26" fill="url(#grass)"/>
    <rect x="140" y="410" width="64" height="124" fill="#5b3a1e"/>
    <rect x="140" y="410" width="64" height="26" fill="url(#grass)"/>
    <rect x="1076" y="470" width="64" height="64" fill="#5b3a1e"/>
    <rect x="1076" y="470" width="64" height="26" fill="url(#grass)"/>
    <rect x="996" y="410" width="64" height="124" fill="#5b3a1e"/>
    <rect x="996" y="410" width="64" height="26" fill="url(#grass)"/>
  </g>

  <text x="600" y="300" text-anchor="middle" font-family="Verdana, 'Segoe UI', sans-serif"
        font-size="88" font-weight="bold" fill="#8fd15f"
        style="letter-spacing:4px">OWENCRAFT</text>
  <text x="600" y="300" text-anchor="middle" font-family="Verdana, 'Segoe UI', sans-serif"
        font-size="88" font-weight="bold" fill="none" stroke="#2c4a1d" stroke-width="3"
        style="letter-spacing:4px">OWENCRAFT</text>

  <text x="600" y="360" text-anchor="middle" font-family="Verdana, 'Segoe UI', sans-serif"
        font-size="40" fill="#ffd76e" style="letter-spacing:6px">ONLINE</text>

  <text x="600" y="420" text-anchor="middle" font-family="'Segoe UI', Verdana, sans-serif"
        font-size="24" fill="#9db4d0">A shared infinite voxel world — explore with your friends</text>
</svg>
